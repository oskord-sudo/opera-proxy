name: Build opera-proxy for OpenWrt 25.12.0 (x86_64)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 rsync gawk unzip libncurses-dev wget file zstd

      - name: Download OpenWrt SDK for x86_64
        run: |
          wget https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          tar -I zstd -xf openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          mv openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64 sdk

      - name: Copy Makefile into local feed
        run: |
          mkdir -p sdk/feeds/local/opera-proxy
          cp package/opera-proxy/Makefile sdk/feeds/local/opera-proxy/
          echo "Contents of sdk/feeds/local/opera-proxy:"
          ls -la sdk/feeds/local/opera-proxy/

      - name: Add local feed and install package
        run: |
          cd sdk
          # Добавляем локальный фид с абсолютным путем
          FEED_PATH="$(pwd)/feeds/local"
          ./scripts/feeds add local "$FEED_PATH"
          # Проверяем список фидов
          echo "Feeds after add:"
          ./scripts/feeds list -n
          # Обновляем фид
          ./scripts/feeds update local
          # Устанавливаем пакет
          ./scripts/feeds install opera-proxy
          cd ..

      - name: Update all feeds and install golang
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install golang
          cd ..

      - name: Prepare default config
        run: |
          cd sdk
          make defconfig
          cd ..

      - name: Download package source
        run: |
          cd sdk
          make package/opera-proxy/download V=s
          cd ..

      - name: Compile the package
        run: |
          cd sdk
          make package/opera-proxy/compile V=s
          cd ..

      - name: Upload compiled package
        uses: actions/upload-artifact@v4
        with:
          name: opera-proxy-x86_64.apk
          path: sdk/bin/packages/**/opera-proxy*.apk
          if-no-files-found: error
