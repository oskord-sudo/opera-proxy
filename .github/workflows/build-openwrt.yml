name: Build opera-proxy for OpenWrt 25.12.0 (x86_64)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 rsync gawk unzip libncurses-dev wget file zstd

      - name: Download OpenWrt SDK for x86_64
        run: |
          wget https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          tar -I zstd -xf openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          mv openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64 sdk

      - name: Copy Makefile into SDK package directory
        run: |
          mkdir -p sdk/package/opera-proxy
          cp package/opera-proxy/Makefile sdk/package/opera-proxy/
          echo "Contents of sdk/package/opera-proxy:"
          ls -la sdk/package/opera-proxy/

      - name: Copy source code into SDK download directory
        run: |
          mkdir -p sdk/dl/opera-proxy
          rsync -av --exclude='.git' --exclude='sdk' ./ sdk/dl/opera-proxy/

      - name: Update feeds and install golang
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install golang
          cd ..

      - name: Prepare default config
        run: |
          cd sdk
          make defconfig
          cd ..

      - name: Enable our package in config (ignore error if not found)
        run: |
          cd sdk
          echo "CONFIG_PACKAGE_opera-proxy=y" >> .config
          make oldconfig || echo "oldconfig may have issues"
          grep "CONFIG_PACKAGE_opera-proxy" .config || echo "Package not in .config, but continuing"
          cd ..

      - name: Show available packages (debug)
        run: |
          cd sdk
          make info | head -100
          cd ..

      - name: Compile the package
        run: |
          cd sdk
          make package/opera-proxy/compile V=s || echo "Compilation failed"
          cd ..

      - name: Upload compiled package
        uses: actions/upload-artifact@v4
        with:
          name: opera-proxy-x86_64.apk
          path: sdk/bin/packages/**/opera-proxy*.apk
          if-no-files-found: warn
