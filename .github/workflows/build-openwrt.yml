name: Build opera-proxy for OpenWrt 25.12.0 (x86_64)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 rsync gawk unzip libncurses-dev wget file zstd

      - name: Download and extract SDK
        run: |
          wget https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          tar -I zstd -xf openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          if [ -d openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64 ]; then
            mv openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64 sdk
            echo "SDK successfully moved to sdk"
          else
            echo "Ошибка: папка SDK не найдена!"
            ls -la
            exit 1
          fi

      - name: Copy Makefile to SDK package directory
        run: |
          mkdir -p sdk/package/opera-proxy
          cp package/opera-proxy/Makefile sdk/package/opera-proxy/
          echo "Makefile copied to sdk/package/opera-proxy/"
          ls -la sdk/package/opera-proxy/

      - name: Update feeds and install golang
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install golang
          cd ..

      - name: Prepare default config
        run: |
          cd sdk
          make defconfig
          cd ..

      - name: Debug package detection
        run: |
          cd sdk
          echo "=== Checking for golang-package.mk ==="
          find feeds -name "golang-package.mk" -ls || echo "Not found"
          echo "=== Running make info (may show errors) ==="
          make info V=s || true
          echo "=== Searching for opera-proxy in package directory ==="
          find package -name "opera-proxy" -type d -ls
          echo "=== Checking if Makefile is readable ==="
          cat package/opera-proxy/Makefile || echo "Cannot read Makefile"
          cd ..

      - name: Force enable opera-proxy in config
        run: |
          cd sdk
          echo "CONFIG_PACKAGE_opera-proxy=y" >> .config
          make oldconfig
          if grep -q "CONFIG_PACKAGE_opera-proxy" .config; then
            echo "Package enabled successfully"
          else
            echo "WARNING: Package not enabled in .config"
          fi
          cd ..

      - name: Compile the package (try anyway)
        run: |
          cd sdk
          make package/opera-proxy/compile V=s || echo "Compilation failed"
          cd ..

      - name: Upload compiled package (if any)
        uses: actions/upload-artifact@v4
        with:
          name: opera-proxy-x86_64.apk
          path: sdk/bin/packages/**/opera-proxy*.apk
          if-no-files-found: warn
